<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>mathOS Games</title> <!-- Changed title to mathOS -->

<link rel="stylesheet" href="style.css">

</head>
<body>

<div id="background"></div>

<div id="main-container">

    <div id="sidebar">
        <!-- Ensure these icon paths are correct and icons exist -->
        <div class="sidebar-icon active"><a href="#"><img src="icons/home.svg" alt="Home"></a></div>
        <div class="sidebar-icon"><a href="#"><img src="icons/controller.svg" alt="Games"></a></div>
        <div class="sidebar-icon"><a href="#"><img src="icons/discord.svg" alt="Discord"></a></div>
        <!-- Add more sidebar icons as needed -->
    </div>

    <div id="content-wrapper">

        <div id="header">
            <h1 class="main-title">mathOS</h1> <!-- Changed main title to mathOS -->
            <div id="search-container">
                <input type="text" id="game-search" placeholder="search games...">
            </div>
        </div>

        <div id="games-grid"></div>

    </div>

</div>

<div id="player" class="hidden">
    <button id="exit-btn">EXIT GAME</button>
    <iframe id="game-frame"></iframe>
</div>

<script src="script.js"></script>

</body>
</html>
