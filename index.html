<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>wither. games</title>

<!-- Fonts and Icons to match the screenshot -->
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@700&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<link rel="stylesheet" href="style.css">

</head>
<body>

<div id="background"></div>

<!-- Sidebar Navigation -->
<div id="sidebar">
    <button id="nav-home" class="active"><i class="fa-solid fa-house"></i></button>
    <button id="nav-games"><i class="fa-solid fa-gamepad"></i></button>
    <button id="nav-discord"><i class="fa-brands fa-discord"></i></button>
</div>

<div id="main-content">
    
    <!-- Home Screen (Screenshot 1) -->
    <div id="home-screen">
        <h1 class="logo glow">wither.</h1>
        <a href="https://fmhy.net" target="_blank" class="sublink">fmhy.net</a>
    </div>

    <!-- Games Menu (Screenshot 2) -->
    <div id="games-screen" class="hidden">
        <h1 class="logo glow">wither | games</h1>
        
        <div class="search-box">
            <input type="text" id="search" placeholder="search games...">
        </div>

        <div id="games-grid"></div>
    </div>

</div>

<!-- Game Player -->
<div id="player" class="hidden">
    <button id="exit-btn">EXIT GAME</button>
    <iframe id="game-frame"></iframe>
</div>

<script src="script.js"></script>

</body>
</html>
